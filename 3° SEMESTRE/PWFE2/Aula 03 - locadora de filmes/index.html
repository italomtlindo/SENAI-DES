<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CATÁLOGOS DE FILMES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
            color: #fff;
        }

        header {
            background: transparent;
        }

        header h1 {
            color: #f8f9fa;
            font-weight: 300;
            letter-spacing: 1px;
        }

        img {
            width: 90px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .navbar {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
        }

        .table {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            border: none;
        }

        .btn-success {
            background: linear-gradient(90deg, #00b09b, #96c93d);
            border: none;
            padding: 10px 20px;
            font-weight: 500;
            border-radius: 30px;
        }

        .form-control {
            border-radius: 10px;
        }

        .modal-content {
            border-radius: 15px;
        }

        .modal-header {
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        input::placeholder {
            font-size: 14px;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-dark shadow">
        <div class="container">

            <a class="navbar-brand fw-bold" href="#">🎬 CineLocadora</a>

            <div class="navbar-nav flex-row gap-3">
                <a class="nav-link active" href="#">Catálogo</a>
                <a class="nav-link" href="#">Adicionar Filme</a>
            </div>

        </div>
    </nav>

    <header class="text-center py-5 mb-4">
        <div class="container">

            <h1>Gerenciamento de Filmes</h1>

            <button class="btn btn-success mt-3" data-bs-toggle="modal" data-bs-target="#modalCli">
                ➕ Adicionar Novo Filme
            </button>

        </div>
    </header>

    <main class="container">

        <input type="text" id="filtroGenero" class="form-control mb-3"
            placeholder="🔍 Buscar por gênero (ex: ação, comédia...)">

        <div class="table-responsive">

            <table class="table table-bordered table-hover text-center align-middle shadow">

                <thead>
                    <tr>
                        <th>🎬 Filme</th>
                        <th>🖼️ Capa</th>
                        <th>🎭 Gênero</th>
                        <th>🎬 Diretor</th>
                        <th>📅 Lançamento</th>
                        <th>⚙️ Ações</th>
                    </tr>
                </thead>

                <tbody id="dados"></tbody>

            </table>

        </div>

    </main>

    <div class="modal fade" id="modalCli">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">

                <form id="formCli">

                    <div class="modal-header bg-danger">
                        <h5 class="modal-title">Cadastrar Novo Filme</h5>
                        <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body d-flex flex-column gap-2">
                        <input type="text" name="nome" class="form-control"
                            placeholder="Nome do filme" required>

                        <input type="url" name="capa" class="form-control"
                            placeholder="Link da imagem da capa" required>

                        <input type="text" name="genero" class="form-control"
                            placeholder="Gênero (ação, terror...)" required>

                        <input type="text" name="autor" class="form-control"
                            placeholder="Diretor do filme" required>

                        <input type="date" name="lancamento" class="form-control" required>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">
                            💾 Salvar Filme
                        </button>

                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            ❌ Cancelar
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>

</body>

</html>
