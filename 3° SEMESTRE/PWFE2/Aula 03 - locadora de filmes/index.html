<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora - Filmes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>LOCADORA DE FILMES</h1>
    <button onclick="abrirModal()">+ Novo</button>
</header>

<input type="text" id="filtroGenero" placeholder="Filtrar por gênero" onkeyup="filtrarGenero()">

<main>
<table>
<thead>
<tr>
    <th>Imagem</th>
    <th>Titulo do Filme</th>
    <th>Ano de Lançamento</th>
    <th>Gênero</th>
    <th>Classificação</th>
    <th>Sinopse</th>
    <th>Ações</th>
</tr>
</thead>

<tbody id="dados"></tbody>

</table>
</main>

<!-- MODAL -->

<div id="modalCli" class="modal">

<form id="formCli" class="modal-content">

<h2>NOVO FILME</h2>

<input type="text" name="img" placeholder="Link da imagem" required>
<input type="text" name="tituloFilme" placeholder="Titulo do Filme" required>
<input type="date" name="anoLancamento" required>
<input type="text" name="genero" placeholder="Gênero" required>
<input type="text" name="classificacao" placeholder="Classificação" required>
<input type="text" name="sinopse" placeholder="Sinopse" required>

<div class="modal-buttons">
<button type="submit">Salvar</button>
<button type="button" onclick="fecharModal()">Cancelar</button>
</div>

</form>
</div>

<script src="script.js"></script>

</body>
</html>
